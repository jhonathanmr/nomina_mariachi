<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nómina Mariachi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .card-estilo { background-color: white; padding: 1.25rem; border-radius: 2rem; border: 1px solid #e2e8f0; margin-bottom: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .modal-overlay { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-10">

    <div id="notificacion" class="fixed top-6 left-1/2 -translate-x-1/2 z-50 hidden bg-emerald-600 text-white px-8 py-3 rounded-full shadow-2xl font-black">
        ✅ SINCRONIZADO
    </div>

    <div id="modal-container" class="fixed inset-0 z-50 hidden flex items-center justify-center p-6 modal-overlay">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl text-center border border-slate-100">
            <div id="modal-icono" class="text-6xl mb-4">⚠️</div>
            <h3 id="modal-titulo" class="text-2xl font-black mb-2 tracking-tight">Confirmar</h3>
            <p id="modal-mensaje" class="text-slate-500 mb-8 leading-relaxed italic">¿Deseas realizar esta acción?</p>
            <div class="flex flex-col gap-3">
                <button id="modal-btn-si" class="bg-blue-600 text-white py-5 rounded-3xl font-black text-lg shadow-lg active:scale-95 transition-all uppercase">Continuar</button>
                <button onclick="cerrarModal()" class="text-slate-400 font-bold py-2">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="pantalla-login" class="flex flex-col items-center justify-center min-h-screen p-6">
        <div class="w-full max-w-sm text-center">
            <span class="text-7xl">🎺</span>
            <h1 class="text-4xl font-black my-8 uppercase tracking-tighter italic">Mariachi<br><span class="text-blue-600">Nómina</span></h1>
            <input type="password" id="pass-input" inputmode="numeric" placeholder="Contraseña" class="w-full text-center text-3xl mb-6 py-6 bg-white border-2 border-slate-100 rounded-[2rem] outline-none shadow-inner">
            <button onclick="validarAcceso()" class="w-full bg-slate-900 text-white p-6 text-xl font-black rounded-[2rem] shadow-xl active:scale-95 transition-all uppercase">Acceder</button>
                        <button onclick="mostrarCambiarPass()" class="mt-6 text-slate-400 text-sm font-medium">Cambiar clave</button>
        </div>
    </div>

    <div id="pantalla-cambiar-pass" class="hidden p-6 max-w-sm mx-auto min-h-screen flex flex-col justify-center">
        <h2 class="text-2xl font-bold mb-6 text-center">Cambiar Clave</h2>
        <input type="password" id="pass-antigua" inputmode="numeric" placeholder="Clave Anterior" class="w-full mb-3 p-4 bg-white border-2 border-slate-200 rounded-2xl">
        <input type="password" id="pass-nueva" inputmode="numeric" placeholder="Clave Nueva" class="w-full mb-6 p-4 bg-white border-2 border-slate-200 rounded-2xl">
        <button onclick="procesarCambioPass()" class="bg-slate-800 text-white p-5 text-xl font-bold rounded-3xl shadow-lg mb-4">ACTUALIZAR</button>
        <button onclick="navegar('login')" class="text-slate-400 w-full text-center">Volver</button>
    </div>

    <div id="pantalla-menu" class="hidden p-6 flex flex-col gap-6 min-h-screen justify-center max-w-sm mx-auto">
        <button onclick="navegar('serenatas')" class="bg-emerald-500 text-white p-6 rounded-[3rem] shadow-xl active:scale-95 flex flex-col items-center justify-center gap-4 h-56">
            <span class="text-7xl">🎵</span>
            <span class="text-2xl font-black uppercase">Serenatas</span>
        </button>
        <button onclick="navegar('cobros')" class="bg-orange-500 text-white p-6 rounded-[3rem] shadow-xl active:scale-95 flex flex-col items-center justify-center gap-4 h-56">
            <span class="text-7xl">💸</span>
            <span class="text-2xl font-black uppercase tracking-widest">Saldos / Pagos</span>
        </button>
    </div>

    <div id="pantalla-serenatas" class="hidden p-4 max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6">
            <button onclick="navegar('menu')" class="text-slate-400 font-bold text-2xl">✕</button>
            <h2 class="text-xl font-black uppercase tracking-widest text-slate-400">Hoy</h2>
        </div>

        <div class="card-estilo border-t-8 border-blue-600 bg-blue-50/30">
            <input type="date" id="fecha-serenata" class="w-full mb-6 p-4 bg-white border-none rounded-2xl font-black text-center shadow-sm">
            <label class="font-bold text-center block mb-4 text-xs uppercase text-slate-400">Total Jornada</label>
            <div class="flex items-center justify-center gap-8 mb-8">
                <button onclick="ajustarGlobal(-1)" class="bg-white shadow-md w-14 h-14 rounded-full text-4xl font-black text-blue-600">-</button>
                <input type="number" id="cant-global" value="1" class="w-20 text-6xl font-black bg-transparent border-none text-center">
                <button onclick="ajustarGlobal(1)" class="bg-white shadow-md w-14 h-14 rounded-full text-4xl font-black text-blue-600">+</button>
            </div>
            <label class="font-bold text-blue-600 text-[10px] uppercase mb-1 block text-center">Transporte / Viáticos (Gral)</label>
            <input type="text" id="recargo-gral" inputmode="numeric" pattern="[0-9]*" value="0" oninput="formatearInput(this); recalcularTodo()" class="w-full text-center text-3xl font-black border-none bg-white p-4 rounded-[2rem] text-blue-700 shadow-sm">
        </div>

        <div id="lista-integrantes-serenata" class="space-y-4"></div>
        <button onclick="confirmarGuardarSerenatas()" class="w-full bg-emerald-600 text-white p-8 text-2xl font-black rounded-[2.5rem] shadow-2xl active:scale-95 mt-10 mb-20 uppercase tracking-widest">Cargar a Cuentas</button>
    </div>

    <div id="pantalla-cobros" class="hidden p-4 max-w-md mx-auto">
        <button onclick="navegar('menu')" class="mb-6 text-slate-400 font-bold text-lg">← Volver</button>
        <div class="flex gap-2 mb-8 bg-slate-200 p-1 rounded-2xl shadow-inner">
            <button id="btn-tab-adelantos" onclick="cambiarTabCobro('adelantos')" class="flex-1 p-4 rounded-xl font-black bg-white shadow-sm">ADELANTOS</button>
            <button id="btn-tab-totales" onclick="cambiarTabCobro('totales')" class="flex-1 p-4 rounded-xl font-bold text-slate-500 uppercase text-xs">Cuentas Totales</button>
        </div>
        <div id="seccion-adelantos" class="card-estilo border-t-8 border-orange-500">
            <select id="select-adelanto" class="w-full mb-6 p-5 bg-slate-50 border-none rounded-2xl font-black text-2xl text-slate-700"></select>
            <input type="text" id="monto-adelanto" inputmode="numeric" pattern="[0-9]*" placeholder="0" oninput="formatearInput(this)" class="w-full text-5xl font-black mb-8 p-6 bg-white border-2 border-slate-50 rounded-[2.5rem] text-orange-600 text-center">
            <button onclick="confirmarAdelanto()" class="w-full bg-orange-500 text-white p-6 text-2xl font-black rounded-[2rem] shadow-xl uppercase">Registrar Pago</button>
        </div>
        <div id="seccion-totales" class="hidden space-y-4">
            <div id="lista-totales"></div>
        </div>
    </div>

<script>
    // CONFIGURACIÓN DE TU PROYECTO
    const firebaseConfig = {
        apiKey: "AIzaSyBYbdLe92IsQdgzLBwgOPhLc1q_UvuESxk",
        authDomain: "nomina-mariachi.firebaseapp.com",
        databaseURL: "https://nomina-mariachi-default-rtdb.firebaseio.com",
        projectId: "nomina-mariachi",
        storageBucket: "nomina-mariachi.firebasestorage.app",
        messagingSenderId: "22825374302",
        appId: "1:22825374302:web:33f92659e24ebba05b1acf"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const VALOR_BASE = 35000;
    const INTEGRANTES = ["Alejandra", "Deivy", "Camilo", "Carlos", "Jhon", "Tatu"];
    
    let config = { pass: "123" };
    let saldos = {};
    let historial = [];

    INTEGRANTES.forEach(n => saldos[n] = 0);

    // SINCRONIZACIÓN AUTOMÁTICA
    db.ref('nomina/').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            saldos = data.saldos || saldos;
            historial = data.historial || [];
            config = data.config || config;
            if(!document.getElementById('pantalla-cobros').classList.contains('hidden')) {
                renderizarTotales();
            }
        }
    });

    async function sincronizarNube() {
        try {
            await db.ref('nomina/').set({
                saldos: saldos,
                historial: historial,
                config: config
            });
            toast();
        } catch (e) { mostrarModal("Error", "No hay conexión a internet", "📡", () => {}); }
    }

    // --- FUNCIONES DE CAMBIO DE CONTRASEÑA (AGREGADAS) ---
    function mostrarCambiarPass() {
        navegar('cambiar-pass');
    }

    async function procesarCambioPass() {
        const antigua = document.getElementById('pass-antigua').value;
        const nueva = document.getElementById('pass-nueva').value;

        if (antigua !== config.pass) {
            mostrarModal("Error", "La clave actual no es correcta", "❌", () => {});
            return;
        }

        if (nueva.length < 3) {
            mostrarModal("Aviso", "La nueva clave es muy corta", "⚠️", () => {});
            return;
        }

        config.pass = nueva;
        await sincronizarNube();
        mostrarModal("Éxito", "Clave actualizada correctamente", "🔒", () => {
            document.getElementById('pass-antigua').value = "";
            document.getElementById('pass-nueva').value = "";
            navegar('login');
        });
    }

    // FUNCIONES DE UI Y LÓGICA EXISTENTE
    function mostrarModal(titulo, mensaje, icono, callback) {
        document.getElementById('modal-titulo').innerText = titulo;
        document.getElementById('modal-mensaje').innerText = mensaje;
        document.getElementById('modal-icono').innerText = icono;
        document.getElementById('modal-container').classList.remove('hidden');
        document.getElementById('modal-btn-si').onclick = () => { cerrarModal(); callback(); };
    }

    function cerrarModal() { document.getElementById('modal-container').classList.add('hidden'); }
    function toast() { 
        const t = document.getElementById('notificacion'); t.classList.remove('hidden');
        setTimeout(() => t.classList.add('hidden'), 2000);
    }

    function navegar(id) {
        document.querySelectorAll('div[id^="pantalla-"]').forEach(p => p.classList.add('hidden'));
        document.getElementById(`pantalla-${id}`).classList.remove('hidden');
        if(id === 'serenatas') renderizarSerenatas();
        if(id === 'cobros') actualizarTabCobros();
        window.scrollTo(0,0);
    }

    function formatearInput(el) {
        let valor = el.value.replace(/\D/g, "");
        el.value = valor ? parseInt(valor).toLocaleString('es-CO') : "0";
    }

    function limpiarValor(str) { return parseInt(str.toString().replace(/\D/g, "")) || 0; }

    function validarAcceso() {
        if(document.getElementById('pass-input').value === config.pass) navegar('menu');
        else mostrarModal("Acceso Denegado", "Clave incorrecta", "❌", () => {});
    }

    function ajustarGlobal(v) {
        const i = document.getElementById('cant-global');
        i.value = Math.max(0, parseInt(i.value) + v);
        INTEGRANTES.forEach((_, idx) => { document.getElementById(`cant-${idx}`).value = i.value; });
        recalcularTodo();
    }

    function ajustarIndividual(idx, v) {
        const i = document.getElementById(`cant-${idx}`);
        i.value = Math.max(0, parseInt(i.value) + v);
        recalcularTodo();
    }

    function renderizarSerenatas() {
    const list = document.getElementById('lista-integrantes-serenata');
    const cantGral = document.getElementById('cant-global').value;
    
    list.innerHTML = INTEGRANTES.map((n, i) => `
        <div class="card-estilo border-l-8 border-emerald-500">
            <div class="flex justify-between items-center mb-6">
                <span class="text-3xl font-black text-slate-800">${n}</span>
                <div class="flex items-center gap-4 bg-slate-50 rounded-2xl px-2 py-1 shadow-inner">
                    <button onclick="ajustarIndividual(${i}, -1)" class="w-12 h-12 bg-white rounded-xl shadow font-black text-2xl">-</button>
                    <input type="number" id="cant-${i}" value="${cantGral}" onchange="recalcularTodo()" class="w-10 text-center font-black bg-transparent border-none text-2xl">
                    <button onclick="ajustarIndividual(${i}, 1)" class="w-12 h-12 bg-white rounded-xl shadow font-black text-2xl text-emerald-500">+</button>
                </div>
            </div>
            
            <div class="flex justify-between items-center mb-2">
                <span class="text-[10px] font-bold text-slate-400 uppercase italic">Extras / Otros</span>
                <input type="text" 
                    id="extra-${i}" 
                    inputmode="numeric" 
                    pattern="[0-9]*" 
                    value="0" 
                    oninput="formatearInput(this); recalcularTodo()" 
                    class="w-40 p-3 bg-slate-50 border-none rounded-2xl text-right font-black text-xl">
            </div>

            <div class="text-right mt-4 border-t border-slate-100 pt-4">
                <span class="text-emerald-600 font-black text-3xl tracking-tighter">$ <span id="total-${i}">0</span></span>
            </div>
        </div>
    `).join('');
    
    recalcularTodo();
}

    function recalcularTodo() {
        const recGral = limpiarValor(document.getElementById('recargo-gral').value);
        INTEGRANTES.forEach((n, i) => {
            const cantIndiv = parseInt(document.getElementById(`cant-${i}`).value) || 0;
            const recIndiv = limpiarValor(document.getElementById(`extra-${i}`).value);
            const total = (cantIndiv * VALOR_BASE) + (cantIndiv > 0 ? recGral : 0) + recIndiv;
            document.getElementById(`total-${i}`).innerText = total.toLocaleString('es-CO');
        });
    }

    function confirmarGuardarSerenatas() {
        mostrarModal("¿Confirmar Registro?", "Los datos se guardarán para siempre en la nube.", "💾", async () => {
            INTEGRANTES.forEach((n, i) => {
                const total = limpiarValor(document.getElementById(`total-${i}`).innerText);
                saldos[n] += total;
            });
            await sincronizarNube();
            navegar('menu');
        });
    }

    function cambiarTabCobro(tab) {
        const isA = tab === 'adelantos';
        document.getElementById('seccion-adelantos').classList.toggle('hidden', !isA);
        document.getElementById('seccion-totales').classList.toggle('hidden', isA);
        document.getElementById('btn-tab-adelantos').className = isA ? "flex-1 p-4 rounded-xl font-black bg-white shadow-sm" : "flex-1 p-4 rounded-xl font-bold text-slate-500 text-xs";
        document.getElementById('btn-tab-totales').className = !isA ? "flex-1 p-4 rounded-xl font-black bg-white shadow-sm" : "flex-1 p-4 rounded-xl font-bold text-slate-500 text-xs";
        if(!isA) renderizarTotales();
    }

    function actualizarTabCobros() {
        const sel = document.getElementById('select-adelanto');
        sel.innerHTML = INTEGRANTES.map(n => `<option value="${n}">${n}</option>`).join('');
        cambiarTabCobro('adelantos');
    }

    function confirmarAdelanto() {
        const n = document.getElementById('select-adelanto').value;
        const m = limpiarValor(document.getElementById('monto-adelanto').value);
        if(m <= 0) return;
        if(m > saldos[n]) {
            mostrarModal("⚠️ Saldo Insuficiente", `${n} tiene $${saldos[n].toLocaleString()}. El saldo quedará en rojo. ¿Proceder?`, "💸", () => ejecutarAdelanto(n, m));
        } else ejecutarAdelanto(n, m);
    }

    async function ejecutarAdelanto(n, m) {
        saldos[n] -= m;
        historial.unshift({ nombre: n, monto: m, fecha: new Date().toLocaleDateString() });
        await sincronizarNube();
        document.getElementById('monto-adelanto').value = "0";
        navegar('menu');
    }

    function renderizarTotales() {
        const list = document.getElementById('lista-totales');
        list.innerHTML = INTEGRANTES.map(n => `
            <div class="card-estilo border-l-8 border-indigo-600 bg-white">
                <div class="flex justify-between items-start mb-4">
                    <span class="text-3xl font-black text-slate-800 leading-none">${n}</span>
                    <span class="text-3xl font-black text-indigo-700 leading-none">$${saldos[n].toLocaleString('es-CO')}</span>
                </div>
                <div class="text-[10px] text-slate-400 font-bold uppercase mb-2">Historial Reciente</div>
                <div class="max-h-32 overflow-y-auto text-[13px] bg-slate-50 p-4 rounded-3xl font-bold">
                    ${historial.filter(h => h.nombre === n).slice(0,5).map(h => `
                    <div class="flex justify-between py-1 border-b border-slate-200">
                        <span>${h.fecha} ${h.tipo ? '<b class="text-[9px] text-indigo-500">LIQ</b>' : ''}</span>
                        <span class="text-red-500">-$${h.monto.toLocaleString()}</span>
                    </div>
`).join('') || '<span class="text-slate-300 italic">Sin movimientos</span>'}
                </div>
                <button onclick="confirmarCobroTotal('${n}')" class="w-full mt-6 bg-slate-900 text-white py-5 rounded-[2rem] font-black text-sm uppercase shadow-lg">Liquidar Cuenta</button>
            </div>
        `).join('');
    }

    function confirmarCobroTotal(n) {
    // Guardamos el saldo actual antes de resetearlo para el historial
    const saldoALiquidar = saldos[n];

    if (saldoALiquidar <= 0) {
        mostrarModal("Aviso", `${n} ya está en $0.`, "ℹ️", () => {});
        return;
    }

    mostrarModal("¿Cuenta Pagada?", `Se reseteará el saldo de ${n} a $0. ¿Ya se entregó el dinero?`, "💰", async () => {
        // 1. Agregamos el registro de "LIQUIDACIÓN" al historial antes de borrar
        historial.unshift({ 
            nombre: n, 
            monto: saldoALiquidar, 
            fecha: new Date().toLocaleDateString(),
            tipo: "LIQUIDACIÓN TOTAL" // Etiqueta para diferenciarlo de un adelanto
        });

        // 2. Ahora sí, reseteamos el saldo
        saldos[n] = 0;
        
        // 3. Sincronizamos con Firebase
        await sincronizarNube();
        renderizarTotales();
    });
}

    window.onload = () => { document.getElementById('fecha-serenata').valueAsDate = new Date(); };
</script>
</body>
</html>
