<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Registro Mariachi</title>
    <link id="favicon" rel="icon" type="image/png" href="admin.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .card-estilo { background-color: white; padding: 1.25rem; border-radius: 2rem; border: 1px solid #e2e8f0; margin-bottom: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .modal-overlay { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); }
        html, body {
            /* Evita el scroll elástico y gestos táctiles de zoom */
            touch-action: pan-x pan-y; 
            /* Evita que el usuario seleccione texto accidentalmente al tocar rápido */
            user-select: none;
            -webkit-user-select: none;
            /* Asegura que el cuerpo ocupe el 100% sin desbordarse */
            overflow-x: hidden;
            position: relative;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-10">

    <div id="notificacion" class="fixed top-6 left-1/2 -translate-x-1/2 z-50 hidden bg-emerald-600 text-white px-8 py-3 rounded-full shadow-2xl font-black">
        ✅ SINCRONIZADO
    </div>

    <div id="modal-container" class="fixed inset-0 z-50 hidden flex items-center justify-center p-6 modal-overlay">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl text-center border border-slate-100">
            <div id="modal-icono" class="text-6xl mb-4">⚠️</div>
            <h3 id="modal-titulo" class="text-2xl font-black mb-2 tracking-tight">Confirmar</h3>
            <p id="modal-mensaje" class="text-slate-500 mb-8 leading-relaxed italic">¿Deseas realizar esta acción?</p>
            <div class="flex flex-col gap-3">
                <button id="modal-btn-si" class="bg-blue-600 text-white py-5 rounded-3xl font-black text-lg shadow-lg active:scale-95 transition-all uppercase">Continuar</button>
                <button onclick="cerrarModal()" class="text-slate-400 font-bold py-2">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="pantalla-login" class="flex flex-col items-center justify-center min-h-screen p-6">
        <div class="w-full max-w-sm text-center">
            <span class="text-7xl">🎺</span>
            <h1 class="text-4xl font-black my-8 uppercase tracking-tighter italic">Mariachi<br><span class="text-blue-600">Servicios</span></h1>
            <input type="password" id="pass-input" inputmode="numeric" placeholder="Contraseña" class="w-full text-center text-3xl mb-6 py-6 bg-white border-2 border-slate-100 rounded-[2rem] outline-none shadow-inner">
            <button onclick="validarAcceso()" class="w-full bg-slate-900 text-white p-6 text-xl font-black rounded-[2rem] shadow-xl active:scale-95 transition-all uppercase">Acceder</button>
            <button onclick="mostrarCambiarPass()" class="mt-6 text-slate-400 text-sm font-medium">Cambiar clave</button>
            </div>
            <!-- <button onclick="mostrarPortalMiembros()" class="mt-4 text-blue-600 text-sm font-bold uppercase tracking-widest">Portal de Músicos →</button> -->
    </div>

    <div id="pantalla-cambiar-pass" class="hidden p-6 max-w-sm mx-auto min-h-screen flex flex-col justify-center">
        <h2 class="text-2xl font-bold mb-6 text-center">Cambiar Clave</h2>
        <input type="password" id="pass-antigua" inputmode="numeric" placeholder="Clave Anterior" class="w-full mb-3 p-4 bg-white border-2 border-slate-200 rounded-2xl">
        <input type="password" id="pass-nueva" inputmode="numeric" placeholder="Clave Nueva" class="w-full mb-6 p-4 bg-white border-2 border-slate-200 rounded-2xl">
        <button onclick="procesarCambioPass()" class="bg-slate-800 text-white p-5 text-xl font-bold rounded-3xl shadow-lg mb-4">ACTUALIZAR</button>
        <button onclick="navegar('login')" class="text-slate-400 w-full text-center">Volver</button>
    </div>

    <div id="pantalla-menu" class="hidden p-6 flex flex-col gap-6 min-h-screen justify-center max-w-sm mx-auto">
        <button onclick="navegar('serenatas')" class="bg-emerald-500 text-white p-6 rounded-[3rem] shadow-xl active:scale-95 flex flex-col items-center justify-center gap-4 h-56">
            <span class="text-7xl">🎵</span>
            <span class="text-2xl font-black uppercase">Serenatas</span>
        </button>
        <button onclick="navegar('cobros')" class="bg-orange-500 text-white p-6 rounded-[3rem] shadow-xl active:scale-95 flex flex-col items-center justify-center gap-4 h-56">
            <span class="text-7xl">💸</span>
            <span class="text-2xl font-black uppercase tracking-widest">Saldos / Pagos</span>
        </button>
    </div>

    <div id="pantalla-serenatas" class="hidden p-4 max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6">
            <button onclick="navegar('menu')" class="text-slate-400 font-bold text-2xl">✕</button>
            <h2 class="text-xl font-black uppercase tracking-widest text-slate-400">Hoy</h2>
        </div>

        <div class="card-estilo border-t-8 border-blue-600 bg-blue-50/30">
            <input type="date" id="fecha-serenata" class="w-full mb-6 p-4 bg-white border-none rounded-2xl font-black text-center shadow-sm">
            <label class="font-bold text-center block mb-4 text-xs uppercase text-slate-400">Total Jornada</label>
            <div class="flex items-center justify-center gap-8 mb-8">
                <button onclick="ajustarGlobal(-1)" class="bg-white shadow-md w-14 h-14 rounded-full text-4xl font-black text-blue-600">-</button>
                <input type="number" id="cant-global" value="1" class="w-20 text-6xl font-black bg-transparent border-none text-center">
                <button onclick="ajustarGlobal(1)" class="bg-white shadow-md w-14 h-14 rounded-full text-4xl font-black text-blue-600">+</button>
            </div>
            <label class="font-bold text-blue-600 text-[10px] uppercase mb-1 block text-center">Transporte / Viáticos (Gral)</label>
            <input type="text" id="recargo-gral" inputmode="numeric" pattern="[0-9]*" value="0" oninput="formatearInput(this); recalcularTodo()" class="w-full text-center text-3xl font-black border-none bg-white p-4 rounded-[2rem] text-blue-700 shadow-sm">
        </div>

        <div id="lista-integrantes-serenata" class="space-y-4"></div>
        <button onclick="confirmarGuardarSerenatas()" class="w-full bg-emerald-600 text-white p-8 text-2xl font-black rounded-[2.5rem] shadow-2xl active:scale-95 mt-10 mb-20 uppercase tracking-widest">Cargar a Cuentas</button>
    </div>

    <div id="pantalla-cobros" class="hidden p-4 max-w-md mx-auto">
        <button onclick="navegar('menu')" class="mb-6 text-slate-400 font-bold text-lg">← Volver</button>
        <div class="flex gap-2 mb-8 bg-slate-200 p-1 rounded-2xl shadow-inner">
            <button id="btn-tab-adelantos" onclick="cambiarTabCobro('adelantos')" class="flex-1 p-4 rounded-xl font-black bg-white shadow-sm">ADELANTOS</button>
            <button id="btn-tab-totales" onclick="cambiarTabCobro('totales')" class="flex-1 p-4 rounded-xl font-bold text-slate-500 uppercase text-xs">Cuentas Totales</button>
        </div>
        <div id="seccion-adelantos" class="card-estilo border-t-8 border-orange-500">
            <select id="select-adelanto" class="w-full mb-6 p-5 bg-slate-50 border-none rounded-2xl font-black text-2xl text-slate-700"></select>
            <input type="text" id="monto-adelanto" inputmode="numeric" pattern="[0-9]*" placeholder="0" oninput="formatearInput(this)" class="w-full text-5xl font-black mb-8 p-6 bg-white border-2 border-slate-50 rounded-[2.5rem] text-orange-600 text-center">
            <button onclick="confirmarAdelanto()" class="w-full bg-orange-500 text-white p-6 text-2xl font-black rounded-[2rem] shadow-xl uppercase">Registrar Pago</button>
        </div>
        <div id="seccion-totales" class="hidden space-y-4">
            <div id="lista-totales"></div>
        </div>
    </div>
    <div id="pantalla-miembros" class="hidden min-h-screen bg-slate-50"></div>

<script>
    // CONFIGURACIÓN DE TU PROYECTO
    const firebaseConfig = {
        apiKey: "AIzaSyBYbdLe92IsQdgzLBwgOPhLc1q_UvuESxk",
        authDomain: "nomina-mariachi.firebaseapp.com",
        databaseURL: "https://nomina-mariachi-default-rtdb.firebaseio.com",
        projectId: "nomina-mariachi",
        storageBucket: "nomina-mariachi.firebasestorage.app",
        messagingSenderId: "22825374302",
        appId: "1:22825374302:web:33f92659e24ebba05b1acf"
    };

    // Inicialización de Firebase Compat
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth(); // Uso correcto en modo compat

    // 1. Vigilante de sesión
    auth.onAuthStateChanged((user) => {
        if (user) {
            console.log("Sesión de administrador activa para Jhonathan Montaño");
        } else {
            console.log("Modo lectura / Dispositivo no vinculado");
        }
    });

    // 2. Función para cuando falle la conexión (el trigger del error)
    function manejarErrorPermisos(error) {
        if (error.code === 'PERMISSION_DENIED' || error.message.toLowerCase().includes('permission_denied')) {
            mostrarPantallaReconexion();
        }
    }

    // 3. La pantalla de bloqueo
    function mostrarPantallaReconexion() {
        // Si ya existe, no la creamos de nuevo
        if (document.getElementById('modal-reconexion')) return;

        const modal = document.createElement('div');
        modal.id = 'modal-reconexion';
        modal.className = "fixed inset-0 bg-white z-[100] flex items-center justify-center p-6";
        modal.innerHTML = `
            <div class="text-center max-w-sm">
                <div class="text-5xl mb-4">📡</div>
                <h2 class="text-xl font-bold mb-2 uppercase">Problema de Conexión al Servidor</h2>
                <p class="text-gray-500 mb-6 text-sm">Ingrese credenciales de enlace o comuníquese con el desarrollador <b>Jhonathan Montaño</b></p>
                
                <input type="email" id="adm-email" placeholder="Correo Servidor" class="w-full p-3 border rounded mb-2">
                <input type="password" id="adm-pass" placeholder="Clave de Enlace" class="w-full p-3 border rounded mb-4">
                
                <button onclick="vincularAdmin()" class="w-full bg-black text-white p-3 rounded font-bold">
                    RECONECTAR SERVIDOR
                </button>
            </div>
        `;
        document.body.appendChild(modal);
    }

    async function vincularAdmin() {
        const email = document.getElementById('adm-email').value;
        const pass = document.getElementById('adm-pass').value;

        try {
            // Persistencia para que no te pida clave cada vez que entres en Pereira
            await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
            await auth.signInWithEmailAndPassword(email, pass);
            
            const modal = document.getElementById('modal-reconexion');
            if (modal) modal.remove();
            
            mostrarModal("Éxito", "Servidor Reconectado Correctamente", "✅", () => {
                location.reload(); 
            });
        } catch (error) {
            console.error(error);
            alert("Credenciales incorrectas.");
        }
    }
    window.vincularAdmin = vincularAdmin;

    async function sincronizarNube() {
        try {
            await db.ref('nomina/').set({
                saldos: saldos,
                historial: historial,
                config: config
            });
            toast();
        } catch (e) {
            // Si el error es por falta de permisos (reglas de Firebase), mostramos tu pantalla
            if (e.message.includes("PERMISSION_DENIED")) {
                mostrarPantallaReconexion();
            } else {
                // Error de internet normal
                mostrarModal("Error", "No hay conexión a internet", "📡", () => {});
            }
        }
    }

    // --- LÓGICA DE RUTAS INDEPENDIENTES ---
    const urlParams = new URLSearchParams(window.location.search);
    const userRole = urlParams.get('role'); // Lee el parámetro ?role=

    window.onload = () => {
        // Función interna para cambiar el archivo del icono
        const cambiarIcono = (archivo) => {
            const link = document.getElementById('favicon');
            link.href = archivo + '?v=' + new Date().getTime(); // El ?v= evita que el navegador use el icono viejo guardado en caché
        };

        // Configurar fecha por defecto en la pantalla de serenatas
        const campoFecha = document.getElementById('fecha-serenata');
        if (campoFecha) {
            // 1. Obtenemos la fecha actual
            const ahora = new Date();
            
            // 2. Restamos 5 horas (5 * 60 * 60 * 1000 milisegundos)
            const fechaColombia = new Date(ahora.getTime() - (5 * 60 * 60 * 1000));
            
            // 3. Lo convertimos a formato ISO (YYYY-MM-DDTHH:mm...) y tomamos solo la fecha
            const soloFecha = fechaColombia.toISOString().split('T')[0];
            
            // 4. Asignamos al input
            campoFecha.value = soloFecha;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const userRole = urlParams.get('role');

        if (userRole === 'musico') {
            cambiarIcono('musico.png'); // Carga tu logo de músico
            document.title = "Músicos - Servivicios";
            document.getElementById('pantalla-login').classList.add('hidden');
            mostrarPortalMiembros();
        } else {
            cambiarIcono('admin.png'); // Carga tu logo de admin
            document.title = "Admin - Servicios Mariachi";
            
           // --- VINCULACIÓN TÉCNICA PERMANENTE ---
            auth.onAuthStateChanged((user) => {
                if (user) {
                    console.log("Servidor vinculado: Acceso total habilitado");
                    // Removemos el modal si existe para no interrumpir el flujo
                    const modalExistente = document.getElementById('modal-reconexion');
                    if (modalExistente) modalExistente.remove();
                } else {
                    console.log("Dispositivo no vinculado. Requiere acción del desarrollador.");
                    mostrarPantallaReconexion();
                }
            });

            // Lógica de persistencia de sesión para el admin
            const lastLogin = localStorage.getItem('admin_session_time');
            const ahora = new Date().getTime();
            const unaHora = 60 * 60 * 1000;

            if (lastLogin && (ahora - lastLogin < unaHora)) {
                navegar('menu');
            } else {
                localStorage.removeItem('admin_session_time');
                navegar('login');
            }
        }
    };

    const VALOR_BASE = 35000;
    const INTEGRANTES = ["Alejandra", "Deivy", "Camilo", "Carlos", "Jhon", "Tatu"];
    
    let config = { pass: "123" };
    let saldos = {};
    let historial = [];

    INTEGRANTES.forEach(n => saldos[n] = 0);

   // --- NUEVA SINCRONIZACIÓN INDEPENDIENTE ---

    // 1. Escuchar SALDOS (Público/Lectura)
    db.ref('nomina/saldos').on('value', (snapshot) => {
        if (snapshot.exists()) {
            saldos = snapshot.val();
            // Si estamos en la pantalla de cobros, actualizamos la vista
            if(!document.getElementById('pantalla-cobros').classList.contains('hidden')) {
                renderizarTotales();
            }
        }
    });

    // 2. Escuchar HISTORIAL (Público/Lectura)
    db.ref('nomina/historial').on('value', (snapshot) => {
        if (snapshot.exists()) {
            historial = snapshot.val() || [];
        }
    });

    // 3. Escuchar CONFIG (Solo lectura si las reglas lo permiten)
    db.ref('nomina/config').on('value', (snapshot) => {
        if (snapshot.exists()) {
            config = snapshot.val() || config;
        }
    });

    // --- FUNCIÓN DE CARGA A LA NUBE MEJORADA ---
    async function sincronizarNube() {
        try {
            // Intentamos guardar todo el bloque de nómina
            await db.ref('nomina/').set({
                saldos: saldos,
                historial: historial,
                config: config
            });
            toast();
        } catch (e) {
            // Si el error es por falta de permisos, lanzamos tu nueva pantalla de reconexión
            if (e.message.includes("PERMISSION_DENIED")) {
                if (typeof mostrarPantallaReconexion === 'function') {
                    mostrarPantallaReconexion();
                }
            } else {
                // Error común de red
                mostrarModal("Error", "No hay conexión a internet", "📡", () => {});
            }
        }
    }

    // --- FUNCIONES DE CAMBIO DE CONTRASEÑA (AGREGADAS) ---
    function mostrarCambiarPass() {
        navegar('cambiar-pass');
    }

    async function procesarCambioPass() {
        const antigua = document.getElementById('pass-antigua').value;
        const nueva = document.getElementById('pass-nueva').value;

        if (antigua !== config.pass) {
            mostrarModal("Error", "La clave actual no es correcta", "❌", () => {});
            return;
        }

        if (nueva.length < 3) {
            mostrarModal("Aviso", "La nueva clave es muy corta", "⚠️", () => {});
            return;
        }

        config.pass = nueva;
        await sincronizarNube();
        mostrarModal("Éxito", "Clave actualizada correctamente", "🔒", () => {
            document.getElementById('pass-antigua').value = "";
            document.getElementById('pass-nueva').value = "";
            navegar('login');
        });
    }

    // FUNCIONES DE UI Y LÓGICA EXISTENTE
    function mostrarModal(titulo, mensaje, icono, callback) {
        document.getElementById('modal-titulo').innerText = titulo;
        document.getElementById('modal-mensaje').innerText = mensaje;
        document.getElementById('modal-icono').innerText = icono;
        document.getElementById('modal-container').classList.remove('hidden');
        document.getElementById('modal-btn-si').onclick = () => { cerrarModal(); callback(); };
    }

    function cerrarModal() { document.getElementById('modal-container').classList.add('hidden'); }
    function toast() { 
        const t = document.getElementById('notificacion'); t.classList.remove('hidden');
        setTimeout(() => t.classList.add('hidden'), 2000);
    }

    function navegar(id) {
        document.querySelectorAll('div[id^="pantalla-"]').forEach(p => p.classList.add('hidden'));
        document.getElementById(`pantalla-${id}`).classList.remove('hidden');
        if(id === 'serenatas') renderizarSerenatas();
        if(id === 'cobros') actualizarTabCobros();
        window.scrollTo(0,0);
    }

    function formatearInput(el) {
        let valor = el.value.replace(/\D/g, "");
        el.value = valor ? parseInt(valor).toLocaleString('es-CO') : "0";
    }

    function limpiarValor(str) { return parseInt(str.toString().replace(/\D/g, "")) || 0; }

    function validarAcceso() {
        const passInput = document.getElementById('pass-input').value;
        if(passInput === config.pass) {
            // Guardamos el momento del login (en milisegundos)
            localStorage.setItem('admin_session_time', new Date().getTime());
            navegar('menu');
        } else {
            mostrarModal("Acceso Denegado", "Clave incorrecta", "❌", () => {});
        }
    }

    function ajustarGlobal(v) {
        const i = document.getElementById('cant-global');
        i.value = Math.max(0, parseInt(i.value) + v);
        INTEGRANTES.forEach((_, idx) => { document.getElementById(`cant-${idx}`).value = i.value; });
        recalcularTodo();
    }

    function ajustarIndividual(idx, v) {
        const i = document.getElementById(`cant-${idx}`);
        i.value = Math.max(0, parseInt(i.value) + v);
        recalcularTodo();
    }

    function renderizarSerenatas() {
    const list = document.getElementById('lista-integrantes-serenata');
    const cantGral = document.getElementById('cant-global').value;
    
    list.innerHTML = INTEGRANTES.map((n, i) => `
        <div class="card-estilo border-l-8 border-emerald-500">
            <div class="flex justify-between items-center mb-6">
                <span class="text-3xl font-black text-slate-800">${n}</span>
                <div class="flex items-center gap-4 bg-slate-50 rounded-2xl px-2 py-1 shadow-inner">
                    <button onclick="ajustarIndividual(${i}, -1)" class="w-12 h-12 bg-white rounded-xl shadow font-black text-2xl">-</button>
                    <input type="number" id="cant-${i}" value="${cantGral}" onchange="recalcularTodo()" class="w-10 text-center font-black bg-transparent border-none text-2xl">
                    <button onclick="ajustarIndividual(${i}, 1)" class="w-12 h-12 bg-white rounded-xl shadow font-black text-2xl text-emerald-500">+</button>
                </div>
            </div>
            
            <div class="flex justify-between items-center mb-2">
                <span class="text-[10px] font-bold text-slate-400 uppercase italic">Extras / Otros</span>
                <input type="text" 
                    id="extra-${i}" 
                    inputmode="numeric" 
                    pattern="[0-9]*" 
                    value="0" 
                    oninput="formatearInput(this); recalcularTodo()" 
                    class="w-40 p-3 bg-slate-50 border-none rounded-2xl text-right font-black text-xl">
            </div>

            <div class="text-right mt-4 border-t border-slate-100 pt-4">
                <span class="text-emerald-600 font-black text-3xl tracking-tighter">$ <span id="total-${i}">0</span></span>
            </div>
        </div>
    `).join('');
    
    recalcularTodo();
}

    function recalcularTodo() {
        const recGral = limpiarValor(document.getElementById('recargo-gral').value);
        INTEGRANTES.forEach((n, i) => {
            const cantIndiv = parseInt(document.getElementById(`cant-${i}`).value) || 0;
            const recIndiv = limpiarValor(document.getElementById(`extra-${i}`).value);
            const total = (cantIndiv * VALOR_BASE) + (cantIndiv > 0 ? recGral : 0) + recIndiv;
            document.getElementById(`total-${i}`).innerText = total.toLocaleString('es-CO');
        });
    }

function confirmarGuardarSerenatas() {
    let fechaInput = document.getElementById('fecha-serenata').value; // Viene como AAAA-MM-DD
    
    // Convertimos de AAAA-MM-DD a DD/MM/AAAA
    let partes = fechaInput.split('-');
    let fechaFormateada = `${partes[2]}/${partes[1]}/${partes[0]}`;

    mostrarModal("¿Confirmar Registro?", "Los datos se cargarán...", "💾", async () => {
        INTEGRANTES.forEach((n, i) => {
            const total = limpiarValor(document.getElementById(`total-${i}`).innerText);
            if(total > 0) {
                saldos[n] += total;
                historial.unshift({ 
                    nombre: n, 
                    monto: total, 
                    fecha: fechaFormateada, // <--- Usamos la fecha convertida
                    tipo: "Serenatas de la fecha" ,
                    timestamp: new Date().getTime()
                });
            }
        });
        await sincronizarNube();
        navegar('menu');
    });
}

    function cambiarTabCobro(tab) {
        const isA = tab === 'adelantos';
        document.getElementById('seccion-adelantos').classList.toggle('hidden', !isA);
        document.getElementById('seccion-totales').classList.toggle('hidden', isA);
        document.getElementById('btn-tab-adelantos').className = isA ? "flex-1 p-4 rounded-xl font-black bg-white shadow-sm" : "flex-1 p-4 rounded-xl font-bold text-slate-500 text-xs";
        document.getElementById('btn-tab-totales').className = !isA ? "flex-1 p-4 rounded-xl font-black bg-white shadow-sm" : "flex-1 p-4 rounded-xl font-bold text-slate-500 text-xs";
        if(!isA) renderizarTotales();
    }

    function actualizarTabCobros() {
        const sel = document.getElementById('select-adelanto');
        sel.innerHTML = INTEGRANTES.map(n => `<option value="${n}">${n}</option>`).join('');
        cambiarTabCobro('adelantos');
    }

    function confirmarAdelanto() {
        const n = document.getElementById('select-adelanto').value;
        const m = limpiarValor(document.getElementById('monto-adelanto').value);
        if(m <= 0) return;
        if(m > saldos[n]) {
            mostrarModal("⚠️ Saldo Insuficiente", `${n} tiene $${saldos[n].toLocaleString()}. El saldo quedará en rojo. ¿Proceder?`, "💸", () => ejecutarAdelanto(n, m));
        } else ejecutarAdelanto(n, m);
    }

    async function ejecutarAdelanto(n, m) {
        saldos[n] -= m;
        historial.unshift({ nombre: n, monto: m, fecha: new Date().toLocaleDateString('es-ES'),tipo: "Adelanto",timestamp: new Date().getTime() });
        await sincronizarNube();
        document.getElementById('monto-adelanto').value = "0";
        navegar('menu');
    }

    function renderizarTotales() {
        const list = document.getElementById('lista-totales');
        if (!list) return;

        // Aseguramos que tenemos datos
        const dataHistorial = window.historial || historial || [];
        const dataSaldos = window.saldos || saldos || {};

        if (INTEGRANTES.length === 0) {
            list.innerHTML = `<p class="text-center p-10 text-slate-400">No hay integrantes definidos.</p>`;
            return;
        }

        list.innerHTML = INTEGRANTES.map(n => {
            const saldoActual = dataSaldos[n] || 0;
            
            // Buscamos los movimientos del músico
            // Filtramos por nombre y por tipos que representen salidas de dinero
            const movimientosMúsico = dataHistorial.filter(h => 
                h.nombre === n && 
                (h.tipo.includes("Adelanto") || h.tipo.includes("LIQUIDACIÓN") || h.tipo.includes("Cobro"))
            );

            // Tomamos solo los últimos 5 para no saturar la vista
            const ultimosMovimientos = movimientosMúsico.slice(0, 5);

            return `
                <div class="card-estilo border-l-8 border-indigo-600 bg-white animate-in fade-in slide-in-from-bottom-2">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Músico</p>
                            <span class="text-2xl font-black text-slate-800 leading-none">${n}</span>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Saldo</p>
                            <span class="text-2xl font-black text-indigo-700 leading-none">$${saldoActual.toLocaleString('es-CO')}</span>
                        </div>
                    </div>
                    
                    <div class="text-[10px] text-slate-400 font-bold uppercase mb-2 italic">Últimos movimientos</div>
                    <div class="bg-slate-50 p-4 rounded-3xl font-bold">
                        ${ultimosMovimientos.length > 0 ? ultimosMovimientos.map(h => `
                            <div class="flex justify-between py-2 border-b border-slate-100 last:border-0 text-[11px]">
                                <span>${h.fecha} <b class="text-indigo-500 ml-2">${h.tipo}</b></span>
                                <span class="text-red-500">-$${(h.monto || 0).toLocaleString()}</span>
                            </div>
                        `).join('') : '<p class="text-slate-300 text-center text-xs italic py-2">Sin historial reciente</p>'}
                    </div>
                    
                    <button onclick="confirmarCobroTotal('${n}')" 
                        class="w-full mt-6 bg-slate-900 text-white py-5 rounded-[2rem] font-black text-xs uppercase shadow-lg active:scale-95 transition-transform">
                        Liquidar Cuenta Completa
                    </button>
                </div>
            `;
        }).join('');
    }

    function confirmarCobroTotal(n) {
    // Guardamos el saldo actual antes de resetearlo para el historial
    const saldoALiquidar = saldos[n];

    if (saldoALiquidar <= 0) {
        mostrarModal("Aviso", `${n} ya está en $0.`, "ℹ️", () => {});
        return;
    }

    mostrarModal("¿Cuenta Pagada?", `Se reseteará el saldo de ${n} a $0. ¿Ya se entregó el dinero?`, "💰", async () => {
        // 1. Agregamos el registro de "LIQUIDACIÓN" al historial antes de borrar
        historial.unshift({ 
            nombre: n, 
            monto: saldoALiquidar, 
            fecha: new Date().toLocaleDateString('es-CO'),
            tipo: "LIQUIDACIÓN TOTAL", // Etiqueta para diferenciarlo de un adelanto
            timestamp: new Date().getTime()
        });

        // 2. Ahora sí, reseteamos el saldo
        saldos[n] = 0;
        
        // 3. Sincronizamos con Firebase
        await sincronizarNube();
        renderizarTotales();
    });
}

async function validarAccesoMiembro() {
    const nombre = document.getElementById('select-miembro-login').value;
    const pinIngresado = document.getElementById('miembro-pin').value;

    // Buscamos en la rama 'miembros' que crearemos en Firebase
    db.ref(`miembros/${nombre}`).once('value', (snapshot) => {
        const datos = snapshot.val();
        
        // Si no existe el miembro, lo creamos con el pin por defecto
        if (!datos) {
            db.ref(`miembros/${nombre}`).set({ pin: "0000" });
            mostrarModal("Nuevo Registro", `Se ha creado tu perfil. Tu clave inicial es 0000. Cámbiala ahora.`, "✨", () => {});
            return;
        }

        if (pinIngresado === datos.pin) {
            localStorage.setItem('sesion_miembro', nombre);
            renderDashboardMiembro(nombre);
        } else {
            mostrarModal("Error", "PIN incorrecto", "🔐", () => {});
        }
    });
}

async function renderDashboardMiembro(nombre) {
    const container = document.getElementById('pantalla-miembros');
    
    // 1. FUNCIÓN INTERNA PARA NORMALIZAR FECHAS Y ORDENAR
    const obtenerTiempo = (fechaStr) => {
        if (!fechaStr) return 0;
        let d, m, a;
        if (fechaStr.includes('-')) {
            [a, m, d] = fechaStr.split('-');
        } else if (fechaStr.includes('/')) {
            [d, m, a] = fechaStr.split('/');
        }
        return new Date(a, m - 1, d).getTime();
    };

    // 2. ORDENAR POR FECHA REAL (No por texto)
    const todosMisMovimientos = historial
        .filter(h => h.nombre === nombre)
        .sort((a, b) => obtenerTiempo(b.fecha) - obtenerTiempo(a.fecha));

    // 3. FILTRO DE CICLO (Desde la última liquidación total)
    const indiceUltimaLiq = todosMisMovimientos.findIndex(h => h.tipo === "Cobro Total");
    const misMovimientos = indiceUltimaLiq !== -1 
        ? todosMisMovimientos.slice(0, indiceUltimaLiq + 1) 
        : todosMisMovimientos;

    // 4. CÁLCULO DE COBRADO (35 DÍAS)
    const hoy = new Date();
    const limite35 = hoy.getTime() - (35 * 24 * 60 * 60 * 1000);
    const cobrado35 = todosMisMovimientos
        .filter(h => obtenerTiempo(h.fecha) >= limite35 && (h.tipo === "Adelanto" || h.tipo === "Cobro Total"))
        .reduce((acc, h) => acc + h.monto, 0);
    
    container.innerHTML = `
        <div class="p-6 pb-24 max-w-md mx-auto bg-slate-50 min-h-screen font-sans">
            <header class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-3xl font-black text-slate-800 leading-none">${nombre}</h2>
                    <p class="text-[10px] font-black text-blue-600 uppercase tracking-widest mt-1">Estado de Servicios</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="mostrarCambioClaveMiembro('${nombre}')" class="bg-white p-3 rounded-2xl shadow-sm border border-slate-100">🔑</button>
                    <button onclick="location.reload()" class="bg-white p-3 rounded-2xl shadow-sm border border-slate-100 text-red-500 font-bold">✕</button>
                </div>
            </header>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-blue-900 p-6 rounded-[2.5rem] text-white shadow-xl shadow-blue-200">
                    <p class="text-[10px] font-black uppercase opacity-60 mb-2">A Favor</p>
                    <p class="text-2xl font-black">$${saldos[nombre].toLocaleString()}</p>
                </div>
                <div class="bg-white p-6 rounded-[2.5rem] text-slate-800 shadow-sm border border-slate-100">
                    <p class="text-[9px] font-black uppercase text-emerald-500 mb-2">Cobrado (35d)</p>
                    <p class="text-2xl font-black">$${cobrado35.toLocaleString()}</p>
                </div>
            </div>

            <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-4 ml-2">Historial del Ciclo</h3>
            
            <div class="space-y-3">
                ${misMovimientos.map(h => {
                    const esIngreso = h.tipo === "Serenatas de la fecha";
                    const colorMonto = esIngreso ? "text-emerald-500" : "text-orange-500";
                    const simbolo = esIngreso ? "+" : "-";
                    
                    return `
                        <div class="bg-white p-5 rounded-[2rem] border border-slate-50 flex justify-between items-center shadow-sm">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 ${esIngreso ? 'bg-emerald-50 text-emerald-600' : 'bg-orange-50 text-orange-600'} rounded-full flex items-center justify-center font-black text-xs">
                                    ${esIngreso ? '♪' : '▼'}
                                </div>
                                <div>
                                    <p class="text-[10px] font-black text-slate-400 uppercase mb-0.5">${h.fecha}</p>
                                    <p class="font-black text-slate-700 text-sm">${h.tipo}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="${colorMonto} font-black text-lg">${simbolo}$${h.monto.toLocaleString()}</p>
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>
            
            <p class="text-center text-[10px] text-slate-300 mt-8 uppercase font-bold tracking-widest">Fin del reporte</p>
            <div class="mt-10 p-6 bg-blue-50/50 rounded-[2.5rem] border border-dashed border-blue-100">
                <p class="text-[12px] font-bold text-blue-400 uppercase text-center leading-relaxed tracking-wider">
                    Las serenatas se suman a tu favor automáticamente.<br>Los adelantos y cobros disminuyen el saldo.
                </p>
            </div>
        </div>
        
    `;
}

function mostrarCambioClaveMiembro(nombre) {
    const container = document.getElementById('pantalla-miembros');
    container.innerHTML = `
        <div class="p-6 flex flex-col items-center justify-center min-h-[80vh]">
            <div class="w-full max-w-sm bg-white p-8 rounded-[2.5rem] shadow-xl">
                <h3 class="text-xl font-black text-center mb-8 uppercase italic">Cambiar Clave</h3>
                <input type="password" id="m-pin-old" inputmode="numeric" placeholder="PIN Actual" class="w-full mb-4 p-5 bg-slate-50 rounded-2xl border-none font-black text-center text-xl">
                <input type="password" id="m-pin-new" inputmode="numeric" placeholder="Nuevo PIN" class="w-full mb-8 p-5 bg-slate-50 rounded-2xl border-none font-black text-center text-xl">
                <button onclick="procesarCambioClaveMiembro('${nombre}')" class="w-full bg-slate-900 text-white p-6 rounded-3xl font-black uppercase">Actualizar</button>
                <button onclick="renderDashboardMiembro('${nombre}')" class="w-full mt-4 text-slate-400 font-bold text-xs uppercase">Cancelar</button>
            </div>
        </div>
    `;
}

async function procesarCambioClaveMiembro(nombre) {
    const vieja = document.getElementById('m-pin-old').value;
    const nueva = document.getElementById('m-pin-new').value;

    db.ref(`miembros/${nombre}`).once('value', async (snapshot) => {
        const datos = snapshot.val();
        if (vieja === datos.pin) {
            await db.ref(`miembros/${nombre}/pin`).set(nueva);
            mostrarModal("Éxito", "Clave cambiada. Inicia sesión de nuevo.", "✅", () => {
                location.reload();
            });
        } else {
            mostrarModal("Error", "La clave actual no coincide.", "❌", () => {});
        }
    });
}
    function cambiarIcono(emoji) {
        const favicon = document.getElementById('favicon');
        favicon.href = `data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>${emoji}</text></svg>`;
    }
</script>
