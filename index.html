<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nómina Mariachi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .card-estilo { background-color: white; padding: 1rem; border-radius: 1.5rem; border: 1px solid #e2e8f0; margin-bottom: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .modal-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-10">

    <div id="notificacion" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 hidden bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl font-bold animate-bounce">
        ✅ Guardado con éxito
    </div>

    <div id="modal-container" class="fixed inset-0 z-50 hidden flex items-center justify-center p-6 modal-overlay">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl text-center">
            <div id="modal-icono" class="text-5xl mb-4">⚠️</div>
            <h3 id="modal-titulo" class="text-xl font-black mb-2">¿Estás seguro?</h3>
            <p id="modal-mensaje" class="text-slate-500 mb-6 text-sm">Esta acción no se puede deshacer.</p>
            <div class="flex flex-col gap-2">
                <button id="modal-btn-si" class="bg-blue-600 text-white p-4 rounded-2xl font-black">CONTINUAR</button>
                <button onclick="cerrarModal()" class="text-slate-400 font-bold p-2">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="pantalla-login" class="flex flex-col items-center justify-center min-h-screen p-6">
        <div class="w-full max-w-sm text-center">
            <div class="text-6xl mb-4">🎺</div>
            <h1 class="text-3xl font-black mb-8 uppercase tracking-tighter italic">Mariachi <span class="text-blue-600">Admin</span></h1>
            <input type="password" id="pass-input" placeholder="Contraseña" class="w-full text-center text-2xl mb-4 py-5 bg-white border-2 border-slate-200 rounded-3xl outline-none focus:border-blue-500">
            <button onclick="validarAcceso()" class="w-full bg-blue-600 text-white p-5 text-xl font-bold rounded-3xl shadow-lg active:scale-95 transition-all">ENTRAR</button>
            <button onclick="mostrarCambiarPass()" class="mt-6 text-slate-400 text-sm font-medium">Configuración de clave</button>
        </div>
    </div>

    <div id="pantalla-cambiar-pass" class="hidden p-6 max-w-sm mx-auto min-h-screen flex flex-col justify-center">
        <h2 class="text-2xl font-bold mb-6 text-center">Cambiar Clave</h2>
        <input type="password" id="pass-antigua" placeholder="Clave Anterior" class="w-full mb-3 p-4 bg-white border-2 border-slate-200 rounded-2xl">
        <input type="password" id="pass-nueva" placeholder="Clave Nueva" class="w-full mb-6 p-4 bg-white border-2 border-slate-200 rounded-2xl">
        <button onclick="procesarCambioPass()" class="bg-slate-800 text-white p-5 text-xl font-bold rounded-3xl shadow-lg mb-4">ACTUALIZAR</button>
        <button onclick="navegar('login')" class="text-slate-400 w-full text-center">Volver</button>
    </div>

    <div id="pantalla-menu" class="hidden p-6 flex flex-col gap-6 min-h-screen justify-center max-w-sm mx-auto">
        <h2 class="text-center text-slate-400 font-bold uppercase tracking-widest text-xs">Menú Gestión</h2>
        <button onclick="navegar('serenatas')" class="bg-emerald-500 text-white p-5 text-xl font-bold rounded-[2.5rem] shadow-xl active:scale-95 flex flex-col items-center justify-center gap-3 h-48">
            <span class="text-6xl">🎵</span> SERENATAS
        </button>
        <button onclick="navegar('cobros')" class="bg-orange-500 text-white p-5 text-xl font-bold rounded-[2.5rem] shadow-xl active:scale-95 flex flex-col items-center justify-center gap-3 h-48">
            <span class="text-6xl">💰</span> COBROS / PAGOS
        </button>
    </div>

    <div id="pantalla-serenatas" class="hidden p-4 max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6 px-2">
            <button onclick="navegar('menu')" class="text-blue-600 font-bold text-lg">✕ Salir</button>
            <h2 class="text-xl font-black uppercase text-slate-400 tracking-tighter">Nueva Fecha</h2>
        </div>

        <div class="card-estilo border-t-8 border-blue-500">
            <input type="date" id="fecha-serenata" class="w-full mb-4 p-3 bg-slate-50 border-none rounded-2xl font-bold text-center">
            
            <label class="font-bold text-center block mb-2 text-xs uppercase text-slate-400">Total de Serenatas hoy</label>
            <div class="flex items-center justify-center gap-8 mb-6 bg-slate-50 p-4 rounded-3xl">
                <button onclick="ajustarGlobal(-1)" class="bg-white border shadow-sm w-12 h-12 rounded-full text-3xl font-black text-blue-600">-</button>
                <input type="number" id="cant-global" value="1" class="w-16 text-5xl font-black bg-transparent border-none text-center">
                <button onclick="ajustarGlobal(1)" class="bg-white border shadow-sm w-12 h-12 rounded-full text-3xl font-black text-blue-600">+</button>
            </div>

            <label class="font-bold text-blue-600 text-[10px] uppercase mb-1 block text-center">Recargo General</label>
            <input type="text" id="recargo-gral" value="0" oninput="formatearInput(this); recalcularTodo()" class="w-full text-center text-3xl font-black border-none bg-blue-50 p-4 rounded-3xl text-blue-700">
        </div>

        <div id="lista-integrantes-serenata" class="space-y-4"></div>

        <button onclick="confirmarGuardarSerenatas()" class="w-full bg-emerald-600 text-white p-6 text-2xl font-black rounded-[2rem] shadow-2xl active:scale-95 mt-8 mb-10">GUARDAR HOY</button>
    </div>

    <div id="pantalla-cobros" class="hidden p-4 max-w-md mx-auto">
        <button onclick="navegar('menu')" class="mb-6 text-blue-600 font-bold">← Volver</button>
        
        <div class="flex gap-2 mb-6 bg-slate-200 p-1 rounded-2xl">
            <button id="btn-tab-adelantos" onclick="cambiarTabCobro('adelantos')" class="flex-1 p-3 rounded-xl font-bold bg-white shadow-sm">ADELANTOS</button>
            <button id="btn-tab-totales" onclick="cambiarTabCobro('totales')" class="flex-1 p-3 rounded-xl font-bold text-slate-500">RESUMEN TOTAL</button>
        </div>

        <div id="seccion-adelantos" class="card-estilo border-t-8 border-orange-500">
            <label class="block font-bold mb-2 text-slate-400 uppercase text-xs">¿Quién pide el adelanto?</label>
            <select id="select-adelanto" class="w-full mb-4 p-4 bg-slate-50 border-none rounded-2xl font-black text-xl"></select>
            <label class="block font-bold mb-2 text-slate-400 uppercase text-xs">Valor ($)</label>
            <input type="text" id="monto-adelanto" placeholder="0" oninput="formatearInput(this)" class="w-full text-4xl font-black mb-6 p-4 bg-white border-2 border-slate-100 rounded-3xl text-orange-600">
            <button onclick="confirmarAdelanto()" class="w-full bg-orange-500 text-white p-6 text-2xl font-black rounded-3xl shadow-xl">CARGAR PAGO</button>
        </div>

        <div id="seccion-totales" class="hidden space-y-4">
            <div id="lista-totales"></div>
        </div>
    </div>

    <script>
        const VALOR_BASE = 35000;
        const INTEGRANTES = ["Alejandra", "Deivy", "Camilo", "Carlos", "Jhon", "Tatu"];
        
        let config = JSON.parse(localStorage.getItem('nomina_config')) || { pass: "123" };
        let saldos = JSON.parse(localStorage.getItem('nomina_saldos')) || {};
        let historial = JSON.parse(localStorage.getItem('nomina_historial')) || [];

        INTEGRANTES.forEach(n => { if(saldos[n] === undefined) saldos[n] = 0; });

        // --- SISTEMA DE MODALES ---
        function mostrarModal(titulo, mensaje, icono, callback) {
            document.getElementById('modal-titulo').innerText = titulo;
            document.getElementById('modal-mensaje').innerText = mensaje;
            document.getElementById('modal-icono').innerText = icono;
            const container = document.getElementById('modal-container');
            container.classList.remove('hidden');
            
            document.getElementById('modal-btn-si').onclick = () => {
                cerrarModal();
                callback();
            };
        }

        function cerrarModal() {
            document.getElementById('modal-container').classList.add('hidden');
        }

        function toast() {
            const t = document.getElementById('notificacion');
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 2500);
        }

        function navegar(id) {
            document.querySelectorAll('div[id^="pantalla-"]').forEach(p => p.classList.add('hidden'));
            document.getElementById(`pantalla-${id}`).classList.remove('hidden');
            if(id === 'serenatas') renderizarSerenatas();
            if(id === 'cobros') actualizarTabCobros();
            window.scrollTo(0,0);
        }

        function formatearInput(el) {
            let valor = el.value.replace(/\D/g, "");
            el.value = valor ? parseInt(valor).toLocaleString('es-CO') : "0";
        }

        function limpiarValor(str) {
            return parseInt(str.toString().replace(/\D/g, "")) || 0;
        }

        function validarAcceso() {
            if(document.getElementById('pass-input').value === config.pass) navegar('menu');
            else {
                mostrarModal("Error", "La contraseña es incorrecta", "❌", () => {});
                document.getElementById('modal-btn-si').innerText = "ENTENDIDO";
            }
        }

        function mostrarCambiarPass() { navegar('cambiar-pass'); }
        
        function procesarCambioPass() {
            const vieja = document.getElementById('pass-antigua').value;
            const nueva = document.getElementById('pass-nueva').value;
            if(vieja === config.pass && nueva !== "") {
                config.pass = nueva;
                localStorage.setItem('nomina_config', JSON.stringify(config));
                mostrarModal("Éxito", "Clave cambiada. Reiniciando...", "🔐", () => location.reload());
            } else { 
                mostrarModal("Error", "Clave anterior no coincide", "❌", () => {});
            }
        }

        function ajustarGlobal(v) {
            const i = document.getElementById('cant-global');
            i.value = Math.max(0, parseInt(i.value) + v);
            INTEGRANTES.forEach((_, idx) => {
                document.getElementById(`cant-${idx}`).value = i.value;
            });
            recalcularTodo();
        }

        function ajustarIndividual(idx, v) {
            const i = document.getElementById(`cant-${idx}`);
            i.value = Math.max(0, parseInt(i.value) + v);
            recalcularTodo();
        }

        function renderizarSerenatas() {
            const list = document.getElementById('lista-integrantes-serenata');
            const cantGral = document.getElementById('cant-global').value;
            list.innerHTML = INTEGRANTES.map((n, i) => `
                <div class="card-estilo border-l-8 border-emerald-500 relative">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-2xl font-black text-slate-800">${n}</span>
                        <div class="flex items-center gap-3 bg-slate-100 rounded-2xl px-2 py-1">
                            <button onclick="ajustarIndividual(${i}, -1)" class="w-10 h-10 bg-white rounded-xl shadow-sm font-black text-xl">-</button>
                            <input type="number" id="cant-${i}" value="${cantGral}" onchange="recalcularTodo()" class="w-8 text-center font-black bg-transparent border-none text-lg">
                            <button onclick="ajustarIndividual(${i}, 1)" class="w-10 h-10 bg-white rounded-xl shadow-sm font-black text-xl">+</button>
                        </div>
                    </div>
                    <div class="flex items-center justify-between gap-3 mb-2">
                        <span class="text-[10px] font-bold text-slate-400 uppercase italic">Recargos / Extras</span>
                        <input type="text" id="extra-${i}" value="0" oninput="formatearInput(this); recalcularTodo()" class="w-32 p-2 bg-slate-50 border-none rounded-xl text-right font-black text-lg">
                    </div>
                    <div class="text-right mt-2 border-t border-slate-100 pt-3">
                        <span class="text-emerald-600 font-black text-2xl tracking-tighter">$ <span id="total-${i}">0</span></span>
                    </div>
                </div>
            `).join('');
            recalcularTodo();
        }

        function recalcularTodo() {
            const recGral = limpiarValor(document.getElementById('recargo-gral').value);
            INTEGRANTES.forEach((n, i) => {
                const cantIndiv = parseInt(document.getElementById(`cant-${i}`).value) || 0;
                const recIndiv = limpiarValor(document.getElementById(`extra-${i}`).value);
                const total = (cantIndiv * VALOR_BASE) + (cantIndiv > 0 ? recGral : 0) + recIndiv;
                document.getElementById(`total-${i}`).innerText = total.toLocaleString('es-CO');
            });
        }

        function confirmarGuardarSerenatas() {
            mostrarModal("¿Guardar cuentas?", "Se sumará el total a la deuda de cada músico.", "💾", () => {
                INTEGRANTES.forEach((n, i) => {
                    const total = limpiarValor(document.getElementById(`total-${i}`).innerText);
                    saldos[n] += total;
                });
                localStorage.setItem('nomina_saldos', JSON.stringify(saldos));
                toast();
                navegar('menu');
            });
        }

        function cambiarTabCobro(tab) {
            const isA = tab === 'adelantos';
            document.getElementById('seccion-adelantos').classList.toggle('hidden', !isA);
            document.getElementById('seccion-totales').classList.toggle('hidden', isA);
            
            const btnA = document.getElementById('btn-tab-adelantos');
            const btnT = document.getElementById('btn-tab-totales');
            
            btnA.className = isA ? "flex-1 p-3 rounded-xl font-bold bg-white shadow-sm" : "flex-1 p-3 rounded-xl font-bold text-slate-500";
            btnT.className = !isA ? "flex-1 p-3 rounded-xl font-bold bg-white shadow-sm" : "flex-1 p-3 rounded-xl font-bold text-slate-500";
            
            if(!isA) renderizarTotales();
        }

        function actualizarTabCobros() {
            const sel = document.getElementById('select-adelanto');
            sel.innerHTML = INTEGRANTES.map(n => `<option value="${n}">${n}</option>`).join('');
            cambiarTabCobro('adelantos');
        }

        function confirmarAdelanto() {
            const n = document.getElementById('select-adelanto').value;
            const m = limpiarValor(document.getElementById('monto-adelanto').value);
            if(m <= 0) return;
            
            if(m > saldos[n]) {
                mostrarModal("Aviso de Deuda", `${n} solo tiene $${saldos[n].toLocaleString()}. Quedará en saldo negativo. ¿Continuar?`, "⚠️", () => ejecutarAdelanto(n, m));
            } else {
                ejecutarAdelanto(n, m);
            }
        }

        function ejecutarAdelanto(n, m) {
            saldos[n] -= m;
            historial.push({ nombre: n, monto: m, fecha: new Date().toLocaleDateString() });
            localStorage.setItem('nomina_saldos', JSON.stringify(saldos));
            localStorage.setItem('nomina_historial', JSON.stringify(historial));
            toast();
            navegar('menu');
        }

        function renderizarTotales() {
            const list = document.getElementById('lista-totales');
            list.innerHTML = INTEGRANTES.map(n => `
                <div class="card-estilo border-l-8 border-indigo-600">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-2xl font-black text-slate-800 leading-none">${n}</span>
                        <span class="text-2xl font-black text-indigo-700 tracking-tighter leading-none">$${saldos[n].toLocaleString()}</span>
                    </div>
                    <div class="text-[10px] text-slate-400 font-bold uppercase mb-2">Adelantos del mes</div>
                    <div class="max-h-24 overflow-y-auto text-[11px] bg-slate-50 p-3 rounded-2xl">
                        ${historial.filter(h => h.nombre === n).map(h => `<div class="flex justify-between mb-1"><span>${h.fecha}</span><span class="font-bold text-red-500">-$${h.monto.toLocaleString()}</span></div>`).join('') || '<span class="text-slate-300 italic">No hay registros</span>'}
                    </div>
                    <button onclick="confirmarCobroTotal('${n}')" class="w-full mt-4 bg-indigo-600 text-white py-4 rounded-2xl font-black text-xs uppercase shadow-lg active:scale-95">LIQUIDAR CUENTA</button>
                </div>
            `).join('');
        }

        function confirmarCobroTotal(n) {
            mostrarModal("¿Liquidar Cuenta?", `Se pondrá el saldo de ${n} en $0. Confirma que ya pagaste el dinero.`, "💸", () => {
                saldos[n] = 0;
                historial = historial.filter(h => h.nombre !== n);
                localStorage.setItem('nomina_saldos', JSON.stringify(saldos));
                localStorage.setItem('nomina_historial', JSON.stringify(historial));
                renderizarTotales();
                toast();
            });
        }

        window.onload = () => { document.getElementById('fecha-serenata').valueAsDate = new Date(); };
    </script>
</body>
</html>
